<!DOCTYPE html>
<html>
<head>
<title>Immune System Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
width:90%;
margin:auto;
margin-top:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,select{
padding:10px;
margin:8px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#1976d2;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.low{color:red;font-weight:bold;}
.normal{color:green;font-weight:bold;}
.high{color:orange;font-weight:bold;}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table,th,td{
border:1px solid #ccc;
}

th,td{
padding:10px;
text-align:center;
}

</style>

</head>

<body>

<header>
🧬 Immune System Statistical Analysis Dashboard
</header>

<div class="container">

<!-- Patient Info -->

<div class="card">

<h3>Operator Information</h3>

<input id="operator" placeholder="Researcher Name">
<input type="date" id="date">

</div>


<!-- Manual Entry -->

<div class="card">

<h3>Manual Patient Data Entry</h3>

<input id="dataInput" placeholder="Example: Arun:3500, Priya:6200, Karthik:5800">

<button onclick="analyzeManual()">Analyze Data</button>

</div>


<!-- PDF Upload -->

<div class="card">

<h3>Upload Blood Report PDF</h3>

<input type="file" id="pdfUpload" accept="application/pdf">

<button onclick="analyzePDF()">Analyze Report</button>

</div>


<!-- Report -->

<div class="card" id="report">

<h3>Analysis Report</h3>

<p>No data analyzed yet.</p>

</div>


<!-- Table -->

<div class="card">

<h3>Patient Status Table</h3>

<table id="table">

<tr>
<th>Patient Name</th>
<th>WBC</th>
<th>Status</th>
</tr>

</table>

</div>


<!-- Chart -->

<div class="card">

<h3>WBC Statistical Chart</h3>

<canvas id="chart"></canvas>

</div>


<!-- Health Tracking -->

<div class="card">

<h3>Health Tracking</h3>

<input id="trackName" placeholder="Patient Name">

<input id="trackWBC" placeholder="WBC Value">

<input type="date" id="trackDate">

<button onclick="saveTracking()">Save Record</button>

<table id="historyTable">

<tr>
<th>Date</th>
<th>Patient</th>
<th>WBC</th>
</tr>

</table>

</div>


<div class="card">

<h3>Immune Trend Chart</h3>

<canvas id="trendChart"></canvas>

</div>


<div class="card">

<button onclick="downloadReport()">Download / Print Report</button>

</div>

</div>

<script>

let chart;
let trendChart;


/* Manual Analysis */

function analyzeManual(){

let input=document.getElementById("dataInput").value;

if(!input){
alert("Enter patient data");
return;
}

let entries=input.split(",");

let names=[];
let numbers=[];

entries.forEach(item=>{

let parts=item.split(":");

names.push(parts[0].trim());
numbers.push(Number(parts[1]));

});

generateReport(names,numbers);

}


/* PDF Analysis */

async function analyzePDF(){

let file=document.getElementById("pdfUpload").files[0];

if(!file){
alert("Upload PDF file");
return;
}

let reader=new FileReader();

reader.onload=async function(){

let typedarray=new Uint8Array(this.result);

const pdf=await pdfjsLib.getDocument(typedarray).promise;

const page=await pdf.getPage(1);

const textContent=await page.getTextContent();

let text=textContent.items.map(item=>item.str).join(" ");

let match=text.match(/WBC[^0-9]*([0-9]+)/i);

if(match){

let wbc=parseInt(match[1]);

generateReport(["PDF Patient"],[wbc]);

}
else{

alert("WBC value not found in report");

}

};

reader.readAsArrayBuffer(file);

}


/* Analysis */

function generateReport(names,numbers){

let operator=document.getElementById("operator").value;
let date=document.getElementById("date").value;

let n=numbers.length;

let sum=numbers.reduce((a,b)=>a+b,0);
let mean=sum/n;

let sorted=[...numbers].sort((a,b)=>a-b);

let median=n%2===0 ?
(sorted[n/2-1]+sorted[n/2])/2 :
sorted[Math.floor(n/2)];

let variance=numbers.reduce((a,b)=>a+Math.pow(b-mean,2),0)/n;
let stdDev=Math.sqrt(variance);

let min=Math.min(...numbers);
let max=Math.max(...numbers);
let range=max-min;

let score=0;

if(mean<4000) score=40;
else if(mean<=11000) score=85;
else score=60;

let report=`

<h3>Research Information</h3>

Operator: ${operator}<br>
Date: ${date}<br><br>

<h3>Statistical Summary</h3>

Total Patients: ${n}<br>
Mean WBC: ${mean.toFixed(2)}<br>
Median: ${median.toFixed(2)}<br>
Standard Deviation: ${stdDev.toFixed(2)}<br>
Minimum: ${min}<br>
Maximum: ${max}<br>
Range: ${range}<br><br>

<h3>Immune Health Score</h3>

Score: ${score}/100

`;

document.getElementById("report").innerHTML=report;


/* Table */

let table=document.getElementById("table");

table.innerHTML=`
<tr>
<th>Patient Name</th>
<th>WBC</th>
<th>Status</th>
</tr>`;

names.forEach((name,i)=>{

let value=numbers[i];

let status="Normal";
let className="normal";

if(value<4000){
status="Low Immunity";
className="low";
}

else if(value>11000){
status="High (Possible Infection)";
className="high";
}

table.innerHTML+=`
<tr>
<td>${name}</td>
<td>${value}</td>
<td class="${className}">${status}</td>
</tr>
`;

});


/* Chart */

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:names,
datasets:[{
label:"WBC Count",
data:numbers
}]
}

});

}


/* Health Tracking */

function saveTracking(){

let name=document.getElementById("trackName").value;
let wbc=document.getElementById("trackWBC").value;
let date=document.getElementById("trackDate").value;

if(!name || !wbc || !date){
alert("Fill all fields");
return;
}

let records=JSON.parse(localStorage.getItem("healthRecords")) || [];

records.push({name:name,wbc:Number(wbc),date:date});

localStorage.setItem("healthRecords",JSON.stringify(records));

loadTracking();

}


function loadTracking(){

let records=JSON.parse(localStorage.getItem("healthRecords")) || [];

let table=document.getElementById("historyTable");

table.innerHTML=`
<tr>
<th>Date</th>
<th>Patient</th>
<th>WBC</th>
</tr>`;

let dates=[];
let values=[];

records.forEach(r=>{

table.innerHTML+=`
<tr>
<td>${r.date}</td>
<td>${r.name}</td>
<td>${r.wbc}</td>
</tr>
`;

dates.push(r.date);
values.push(r.wbc);

});

if(trendChart) trendChart.destroy();

trendChart=new Chart(document.getElementById("trendChart"),{

type:"line",

data:{
labels:dates,
datasets:[{
label:"WBC Trend",
data:values,
fill:false,
tension:0.3
}]
}

});

}

loadTracking();


function downloadReport(){

window.print();

}

</script>

</body>
</html>
