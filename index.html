<!DOCTYPE html>
<html>
<head>
<title>Immune System Analyzer - Login</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1976d2,#0d47a1);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#1976d2;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.switch{
margin-top:15px;
color:#1976d2;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2 id="title">Sign In</h2>

<input id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="submitForm()">Submit</button>

<p class="switch" onclick="toggleForm()">Create new account</p>

<p class="error" id="error"></p>

</div>

<script>

let mode="login";

function toggleForm(){

let title=document.getElementById("title");
let switchText=document.querySelector(".switch");

if(mode==="login"){

mode="signup";
title.innerText="Sign Up";
switchText.innerText="Already have account? Sign In";

}else{

mode="login";
title.innerText="Sign In";
switchText.innerText="Create new account";

}

}


function submitForm(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(!user || !pass){

document.getElementById("error").innerText="Fill all fields";
return;

}

if(mode==="signup"){

localStorage.setItem(user,pass);

document.getElementById("error").style.color="green";
document.getElementById("error").innerText="Account created! Please Sign In.";

toggleForm();

}

else{

let storedPass=localStorage.getItem(user);

if(storedPass===pass){

window.location.href="index.html";

}else{

document.getElementById("error").innerText="Invalid login credentials";

}

}

}

</script>

</body>
</html>
